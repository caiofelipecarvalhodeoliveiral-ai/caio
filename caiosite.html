<!DOCTYPE html>
<html>
<head>
    <title>⚠️ HACK DETECTADO ⚠️</title>
    <style>
        body {
            background: black;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .hack-box {
            background: #0a0a0a;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        
        h1 {
            color: #00ff00;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        p {
            color: #88ff88;
            margin: 10px 0;
        }
        
        .progress {
            width: 100%;
            height: 20px;
            background: #001a00;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 0.05s;
        }
        
        button {
            background: #001a00;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            margin-top: 20px;
        }
        
        button:hover {
            background: #00ff00;
            color: black;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="hack-box">
        <h1>⚠️ HACK DETECTADO ⚠️</h1>
        <p>Seu dispositivo foi comprometido!</p>
        <div class="progress">
            <div class="progress-fill" id="progress"></div>
        </div>
        <p id="status" class="blink">🔴 HACK EM ANDAMENTO...</p>
        <button id="okBtn" style="display: none;" onclick="fechar()">OK</button>
    </div>

    <script>
        let progress = 0;
        const interval = setInterval(() => {
            progress += 2;
            document.getElementById('progress').style.width = progress + '%';
            
            if (progress >= 100) {
                clearInterval(interval);
                document.getElementById('status').innerHTML = '😂 BRINCADEIRA! Nada foi hackeado!';
                document.getElementById('status').style.color = '#00ff00';
                document.getElementById('okBtn').style.display = 'inline-block';
            }
        }, 80);
        
        function fechar() {
            document.body.innerHTML = '<div style="background:black; color:#00ff00; height:100vh; display:flex; align-items:center; justify-content:center; font-family:monospace; text-align:center;"><div><h1>😂 FOI SÓ UMA BRINCADEIRA! 😂</h1><p>Nenhum dado foi hackeado.<br>Seu dispositivo está seguro.</p></div></div>';
        }
    </script>
</body>
</html>
